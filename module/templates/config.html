<form autocomplete="off">
    <div class="form-group">
        <label>{{localize "FDB.Settings.Token.Name"}}</label>
        <input type="password" name="discordToken" value="{{discordToken}}" placeholder="MTxxxxxxxxxxxxxxx" />
        <p class="notes">{{localize "FDB.Settings.Token.Hint"}}</p>
    </div>

    <div class="form-group">
        <label>{{localize "FDB.Settings.GuildId.Name"}}</label>
        <input type="text" name="discordGuildId" value="{{discordGuildId}}" placeholder="729311581019570186" />
        <p class="notes">{{localize "FDB.Settings.GuildId.Hint"}}</p>
    </div>

    <div class="form-group">
        <div class="fdb-channel-row">
            <select name="discordChannelId" id="fdb-channel-select" class="fdb-channel-select">
                {{#if discordChannelId}}
                <option value="{{discordChannelId}}" selected>{{discordChannelName}}</option>
                {{else}}
                <option value="" selected>— {{localize "FDB.Config.SelectChannel"}} —</option>
                {{/if}}
            </select>
            <button type="button" id="fdb-load-channels" class="fdb-btn-secondary">
                <i class="fas fa-list"></i> {{localize "FDB.Config.LoadChannels"}}
            </button>
        </div>
        <p class="notes">{{localize "FDB.Settings.ChannelId.Hint"}}</p>
        <div id="fdb-channel-status" class="fdb-channel-status"></div>
    </div>

    <div class="form-group">
        <label>{{localize "FDB.Settings.WebhookUrl.Name"}}</label>
        <input type="text" name="discordWebhookUrl" value="{{discordWebhookUrl}}" placeholder="https://discord.com/api/webhooks/..." />
        <p class="notes">{{localize "FDB.Settings.WebhookUrl.Hint"}}</p>
    </div>

    <h3 class="fdb-section-title"><i class="fas fa-wrench"></i> {{localize "FDB.Config.Advanced"}}</h3>

    <div class="form-group">
        <label>{{localize "FDB.Settings.Debug.Name"}}</label>
        <div class="fdb-toggle-row">
            <input type="checkbox" name="debug" id="fdb-debug" {{#if debug}}checked{{/if}} />
            <label for="fdb-debug">{{localize "FDB.Settings.Debug.Hint"}}</label>
        </div>
    </div>

    <div class="form-group">
        <button type="button" id="fdb-test-connection" class="fdb-btn-secondary" style="width:100%;">
            <i class="fas fa-plug"></i> {{localize "FDB.Config.TestConnection"}}
        </button>
        <div id="fdb-test-result" class="fdb-test-result"></div>
    </div>

    <button type="submit">
        <i class="fas fa-save"></i> {{localize "FDB.ConfigMenu.Save"}}
    </button>
</form>
